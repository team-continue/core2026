costmap_build_node:
  ros__parameters:
    # ----- topics -----
    points_in_topic: /livox/lidar
    points_no_self_topic: /livox/lidar/no_self

    # ----- frames -----
    odom_frame: odom
    base_frame: base_link
    lidar_frame: livox_frame

    # ----- local rolling window -----
    local_width_m: 10.0
    local_height_m: 10.0
    resolution_m: 0.05
    update_hz: 10.0

    # ----- point filtering (PCLなし) -----
    crop_xy_m: 6.0           # ロボ周り±6mだけ使う
    min_z_m: 0.25
    max_z_m: 1.60
    voxel_leaf_m: 0.05       # Mid-360なら 5cm 推奨

    self_crop_min_range_m: 0.6  # Stage1: ロボット自身除去の最小距離
    min_range_m: 0.6            # (後方互換用、self_crop_min_range_m と同値推奨)
    max_range_m: 6.0

    # ----- inflation -----
    inflation_radius_m: 0.50 # 障害物からの膨張半径（LETHAL ゾーン）[m]
    decay_margin_m: 0.30     # LETHAL ゾーン外側の線形減衰幅 [m]

    # ----- behavior -----
    points_timeout_sec: 0.2  # 点群止まったら更新停止
    tf_timeout_ms: 50

    # ----- debug outputs -----
    publish_filtered_points: true
    publish_no_self_points: true
    max_debug_points: 20000
