# Left turret forbidden region sample (joint_state yaw/pitch in rad, boundary order)
/**:
  ros__parameters:
    forbidden_region_enabled: true

    # 6 sample boundary points (ordered)
    # Interpreted as an open polyline in yaw/pitch space.
    forbidden_region_points_yaw:   [0.25, 0.38, 0.52, 0.64, 0.72, 0.80]
    forbidden_region_points_pitch: [-0.55, -0.47, -0.40, -0.33, -0.22, -0.10]

    # Point and segment neighborhoods (rad in joint_state measured yaw/pitch space)
    forbidden_region_point_radius: 0.03
    forbidden_region_connect_as_polyline: true
    forbidden_region_polyline_margin: 0.05
    forbidden_region_closed_loop: false
    forbidden_region_detour_extra_margin: 0.03
